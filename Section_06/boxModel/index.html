<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <style>
      div {
        width: 200px;
        height: 200px;
      }

      p {
        margin: 0;
      }

      #cadet {
        background-color: cadetblue;
        border: solid 10px;
        padding: 20px;
      }

      #gold {
        background-color: gold;
        border-top: solid 20px;
        border-bottom: solid 20px;
        border-left: solid 10px;
        border-right: solid 10px;
        margin-left: 260px;
      }

      #indian {
        background-color: indianred;
        border: solid 10px;
        margin-left: 40px;
        border-width: 20px 40px 60px
      }
    </style>
  </head>

  <body>
    <div id="cadet">
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at
        sapien porttitor urna elementum lacinia. In id magna pulvinar, ultricies
        lorem id, vehicula elit. Aliquam eu luctus nisl, vitae pellentesque
        magna. Phasellus dolor metus, laoreet ac convallis sit amet, efficitur
        sed dolor.
      </p>
    </div>
    <div id="gold"></div>
    <div id="indian"></div>
  </body>
</html>
